<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        lang="en"
>
<head>
    <title>Falsehoods Welcome</title>
    <base th:href="${baseUrl}" />
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous">

    <link href="styles/falsehood-styles.css" rel="stylesheet" />
    <link href="styles/nav-bar.css" rel="stylesheet" />
    <link href="styles/tc-styles.css" rel="stylesheet" />
    <link href="styles/article-styles.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <link href="styles/popup.css" rel="stylesheet" />
    <link href="styles/color-picker.css" rel="stylesheet" />
    <script src="js/popup.js" defer></script>
</head>
<body>

    <script th:inline="javascript">
        var elementItemSetting = [[${elementItemSetting}]]
        var elementItemSettingOrig = [[${elementItemSetting}]]

        var elementContainerSetting = [[${elementContainerSetting}]]
        var elementContainerSettingOrig = [[${elementContainerSetting}]]
    </script>

<div th:replace="~{fragments/topbar :: bar}"></div>

<div style="height:50px"></div>


<h2 th:text="${brandName}"></h2>

<button
        th:if="${isResourceEmployee} and (${reviewStage} == 'SUBMITTED')"
        class="btn btn-info"

        id="start-review-mode"
>Review</button>


<hr>


<div th:if="${isResourceEmployee} and (${reviewStage} == 'SUBMITTED')"
     class="rs-review-pane" id="rs-review-pane">
    <div class="form-check">
        <label for="is-approving" class="form-check-label">Approve</label>
        <input type="checkbox" class="form-check-input" id="is-approving">
    </div>
    <div class="form-group">
        <label>Comment</label>
        <input type="text" class="form-control" id="comment-input" >
    </div>
    <div class="form-group">
        <button class="btn btn-warning" id="review-cancel-button">Cancel</button>
        <button class="btn btn-primary" id="review-submit-button">Submit</button>
    </div>
</div>


<div class="rs-article-container">




    <div class="rs-metadata-container">
        <div th:if="${brandPic != null}" class="rs-image-container">
            <div class="rs-image-holder">
                <img th:src="${brandPic}">
            </div>
            <div th:if="${imgDesc != null}" class="rs-image-desc-holder">
                <p class="rs-image-desc" th:text="${imgDesc}"></p>
            </div>
        </div>

        <div class="rs-metadata-holder rs-table-holder">
            <table>
                <tr th:each="entry: ${entries}">
                    <td th:text="${entry.key}"></td>
                    <td th:text="${entry.value}"></td>
                </tr>
            </table>
        </div>
    </div>

    <hr>

    <div class="rs-article-contents " id="article-contents"></div>
</div>

<div class="bottom-bar"></div>

<script th:inline="javascript">
    let content = [[${brandContent}]]
    let brandId = [[${brandId}]]

    var falsehoodServiceUrl = [[${falsehoodServiceUrl}]]

    let contentDiv = undefined;
    let reviewPanel = undefined;
    let approveCheckbox = undefined;
    let startReviewButton = undefined;
    let commentInput = undefined;

    let reviewCancelButton = undefined;
    let reviewSubmitButton = undefined;

    let isApproving = false;
    let reviewComment = "";

    document.addEventListener('DOMContentLoaded', (event) => {

        // Set up content
        contentDiv = document.getElementById("article-contents");
        contentDiv.innerHTML = marked.parse(content);

        // Review Panel set up
        reviewPanel = document.getElementById("rs-review-pane");
        if(!reviewPanel) return;
        setReviewMode(false);

        // set up elements in the review panel
        approveCheckbox = document.getElementById("is-approving");
        if(approveCheckbox){
            approveCheckbox.addEventListener("change", updateIsApproving)
        }

        startReviewButton = document.getElementById("start-review-mode");
        if(startReviewButton){
            startReviewButton.addEventListener("click", () => {
                setReviewMode(true);
            });
        }

        commentInput = document.getElementById("comment-input");
        if(commentInput){
            commentInput.addEventListener("input", onCommentInput);
        }

        reviewCancelButton = document.getElementById("review-cancel-button");
        reviewSubmitButton = document.getElementById("review-submit-button");
        reviewCancelButton.addEventListener("click", () => {
            setReviewMode(false);
        })
        reviewSubmitButton.addEventListener("click", submitReview)
    });

    function onCommentInput(e) {
        reviewComment = e.target.value;
    }

    function updateIsApproving(e) {
        isApproving = e.target.checked;
    }

    function setReviewMode(enteringReviewMode) {
        if(!reviewPanel) return;

        reviewPanel.style.height = enteringReviewMode ? "auto" : "0";

        if(approveCheckbox){
            isApproving = approveCheckbox.checked;
        }
    }

    let submittingReview = false;

    function submitReview(e) {
        if(submittingReview) return;

        submittingReview = true;
        let button = e.target;
        button.disabled = true;
        button.classList.add("button-dis");

        fetch(`${falsehoodServiceUrl}/brands-update-api`, {
                method: 'PUT',
                body: JSON.stringify({
                    id: brandId,
                    approve: isApproving,
                    comment: reviewComment
                }),
                headers: {
                    "Content-Type": "application/json"
                }
            }).then(async (response) => {
                submittingReview = false;
                let message = "Submitted!";

                let responseObj = await response.json();

                if(responseObj.message == 'Confirmed'){
                    message += " Article is now Confirmed!";

                    if(startReviewButton){
                        startReviewButton.hidden = true;
                    }
                }

                alert(message);

                setReviewMode(false);

            }).catch(() => {
                submittingReview = false;
                alert("Failed to submit review!");
            }).finally(() => {
                button.disabled = false;
                button.classList.remove("button-dis");
             });
    }

</script>

</body>
</html>
