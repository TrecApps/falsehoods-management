<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Login - Falsehoods Tracker</title>
        <link
                href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
                rel="stylesheet"
                integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
                crossorigin="anonymous">

        <link th:href="@{/styles/falsehood-styles.css}" rel="stylesheet" />
        <link th:href="@{/styles/login.css}" rel="stylesheet" />
        <link th:href="@{/styles/tc-styles.css}" rel="stylesheet" />
    </head>

    <body>
        <div  class="container" id="loginContainer" style="background-color: #00DDFF">
            <div id="messageJumbo" class="fadeInGradient tc-jumbotron" style="background: linear-gradient(45deg, #fff685 50%, #00DDFF 80%)">
                <h3 class="header-on-mobile" style="color:#ff1d58">TrecAccount Login...</h3>
                <div class="section-on-desktop">
                    <h1 style="color:#ff1d58">TrecAccount Login</h1>
                    <div id="logoContainer" class="containGlobal">
                        <img class="LoginImage fadeInRight" th:src="@{/images/icons/outline.png}">
                        <div class="clearfix"></div>
                        <img class="LoginImage-ref-2 fadeInLeftRef" id="Globe1" th:src="@{/images/icons/glob-2.png}">
                        <img id="Globe2" class="LoginImage-ref fadeInRightRef" th:src="@{/images/icons/world-1.png}">
                    </div>
                </div>
            </div>

            <div width="100%" class="form">
                <h4 style="color:red" hidden id="error-message">Failed To Login</h4>

                <div class="form-group" id="username-form">
                    <label class="form-label" id="username-label" for="username-input">Username</label>
                    <input class="form-control" id="username-input" oninput="setUsername(e)">
                    <br>
                    <button class="btn btn-primary" id="username-submit" disabled onclick="submitUsername()">Submit</button>
                    <a class="btn btn-info" th:href="${createAccountUrl}" target="_blank">Create Account</a>
                </div>

                <div hidden class="element-container element-container-default" id="pre-method-holder">

                </div>

                <div hidden class="element-container element-container-default" id="sel-method-holder">

                </div>

                <div hidden class="element-container element-container-default" id="method-submit-form">
                    <div class="form-group">
                        <label class="form-check-label" for="noExpire" id="noExpireLabel">Stay Logged In (Not recommended on Public Devices)</label><br>
                        <input class="form-check-input" type="checkbox" id="noExpire" onchange="onStayLoggedIn(e)" style="margin-left: 0;">
                        <br>
                        <button class="btn btn-primary" id="submit-auth-button" onclick="submitLogin()">Login</button>
                    </div>
                </div>


            </div>

        </div>

        <script>
            let username = "";

            let authMethods = [];

            let userServiceUrl = [[${userServiceUrl}]]

            let stayLoggedIn = false;

            function setUsername(e){
                username = e.target.value;
                document.getElementById('username-submit').disabled = !makingCall && username.trim().length > 5;
            }

            function transferToPage() {
                const queryString = window.location.search;
                const urlParams = new URLSearchParams(queryString);

                let targetEndpoint = "/Welcome";

                let gatewayPath = [[${gatewayPath}]];

                let target = urlParams.get("target");

                if(target) {
                    switch(target) {
                        case "":

                        break;
                    }
                }


                document.location.href = `${location.host}${gatewayPath}${targetEndpoint}`
            }

            function checkLoginReady() {
                let count = 0;
                for(let authMethod of authMethods) {
                    if(!authMethod.selected) continue;

                    if(!authMethod.code.trim().length) return false;

                    count++;
                }

                return count > 0;
            }

            let makingCall = false;
            function submitLogin() {

                if(makingCall) return;
                makingCall = false;
                let useMethods = authMethods.filter((am) => am.selected).map((am) => {
                    name: am.name,
                    code: am.code
                });

                fetch(`${userServiceUrl}/Login`, {
                    method: 'POST',
                    body: JSON.stringify({
                        username,
                        credentials: useMethods,
                        stayLoggedIn
                    }),
                    headers: {
                        "Content-Type": "application/json"
                    }
                }).then((response) => {
                    makingCall = false;

                    if(response.status == 200){
                        transferToPage();
                    } else {
                    document.getElementById("error-message").hidden = false;
                    }
                }).catch(() => {

                    makingCall = false;
                    document.getElementById("error-message").hidden = false;
                })
            }

            function onStayLoggedIn(e) {
                stayLoggedIn = e.target.checked;
            }

            function resetForm() {
                let userForm = document.getElementById("username-form");
                let preList = document.getElementById("pre-method-holder");
                let selList = document.getElementById("sel-method-holder");

                if(!authMethods || !authMethods.length){
                    userForm.hidden = false;
                    preList.hidden = true;
                    selList.hidden = true;
                    document.getElementById("method-submit-form").hidden = true;
                    return;
                }

                userForm.hidden = true;
                preList.hidden = false;
                selList.hidden = false;
                document.getElementById("method-submit-form").hidden = false;

                while (preList.firstChild) {
                    preList.removeChild(preList.firstChild);
                }

                while (selList.firstChild) {
                    selList.removeChild(selList.firstChild);
                }

                for(let authMethodIndex in authMethods) {

                    let authMethod = authMethods[authMethodIndex];

                    let mechHolder = document.createElement("div");
                    mechHolder.classList.add("element-item");
                    mechHolder.classList.add("element-item-default");

                    if(authMethod.selected) {
                        // Create the form div holding three elements
                        let formDiv = document.createElement("div");
                        formDiv.classList.add("form-group");
                        mechHolder.appendChild(formDiv);

                        // Set up the label
                        let labelEl = document.createElement("label");
                        labelEl.textContent = `${authMethod.name} - ${authMethod.type}`;
                        formDiv.appendChild(labelEl);

                        // Set up the input element
                        let inputEl = document.createElement("input");
                        inputEl.classList.add("form-control");
                        inputEl.setAttribute('type', 'password');
                        inputEl.value = authMethod.code;
                        inputEl.addEventListener('input', (e) => {
                            authMethod.code = e.target.value;

                            document.getElementById('submit-auth-button').disabled = !checkLoginReady();
                        });
                        formDiv.appendChild(inputEl);

                        // Add the Button needed to switch element back to the unselected list
                        let sButton = document.createElement("button");
                        sButton.classList.add("btn");
                        sButton.classList.add("btn-danger");
                        sButton.textContent = "Deselect";
                        sButton.addEventListener('click', () => {
                            // mark auth method for deselection
                            authMethod.selected = false;

                            // allow listener to return and reset the form
                            setTimeout(() => {
                                resetForm();
                            }, 100)
                        })
                        formDiv.appendChild(sButton);

                        selList.appendChild(mechHolder);
                    } else {

                        mechHolder.addEventListener('click', () => {
                            // mark auth method for selection
                            authMethod.selected = true;

                            // allow listener to return and reset the form
                            setTimeout(() => {
                                resetForm();
                            }, 100)
                        });
                        mechHolder.innerHtml = `<p><b>Method: </b>${ authMethod.name }</p>
                                                <p><i>Type: </i>{{ authMethod.type }}</p>`;

                        preList.appendChild(mechHolder);

                    }

                }

            }

            function submitUsername(){
                if(makingCall) return;

                makingCall = true;

                fetch(`${userServiceUrl}/Login/username/${username}`).then(async (response) => {
                    authMethods = await response.json().map((entry) => {
                        ...entry,
                        code: "",
                        selected: false
                    });

                    document.getElementById("error-message").hidden = true;

                    makingCall = false;
                }).catch(() => {
                    document.getElementById("error-message").hidden = false;
                    makingCall = false;
                });
            }
        </script>

    </body>

</html>
