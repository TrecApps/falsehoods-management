<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        lang="en"
        >
    <head>
        <title>Falsehoods Welcome</title>
        <base th:href="${baseUrl}" />
        <link
                href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
                rel="stylesheet"
                integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
                crossorigin="anonymous">

        <link href="styles/falsehood-styles.css" rel="stylesheet" />
        <link href="styles/nav-bar.css" rel="stylesheet" />
        <link href="styles/tc-styles.css" rel="stylesheet" />

    </head>
    <body>

    <div th:replace="~{fragments/topbar :: bar}"></div>
    <div style="height:50px"></div>

    <div style="height:35px;"></div>

    <div class="container element-container" th:classappend="${elementContainerSetting}">


        <h1 class="element-item" th:classappend="${elementItemSetting}">Welcome to the TrecApps Falsehood Tracking Service</h1>

        <div class="element-item" th:classappend="${elementItemSetting}">
            <div th:each="guideline : ${guidelines}">
                <h2 th:text="${ guideline.label }"></h2>
                <p th:each="detail : ${guideline.content }"><span th:text="${ detail }"></span></p>

            </div>

        </div>



    </div>

    <div class="bottom-bar"></div>
        <script
                src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
                crossorigin="anonymous">

        </script>
    </body>
</html>
